openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: SubNation Digital Subscriptions Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: products
    description: Product catalog
  - name: orders
    description: Orders and checkout
  - name: wallet
    description: Wallet and top-ups
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Phone already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with phone and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Products ────────────────────────────────────────────────────────────────
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all active products
      parameters:
        - name: category
          in: query
          schema:
            type: ["string", "null"]
        - name: available_only
          in: query
          schema:
            type: ["boolean", "null"]
        - name: sort
          in: query
          schema:
            type: ["string", "null"]
            enum: ["price_asc", "price_desc", "popular", "newest", null]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /catalog/stats:
    get:
      operationId: getCatalogStats
      tags: [products]
      summary: Get catalog summary stats
      responses:
        "200":
          description: Catalog stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogStats"

  /flash-sale:
    get:
      operationId: getFlashSale
      tags: [products]
      summary: Get active flash sale
      responses:
        "200":
          description: Active flash sale or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashSaleResponse"

  # ── Orders ──────────────────────────────────────────────────────────────────
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List current user's orders
      responses:
        "200":
          description: User's orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Purchase a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Insufficient balance or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found or out of stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderCode}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order details by order code
      parameters:
        - name: orderCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Wallet ──────────────────────────────────────────────────────────────────
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet info
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wallet/topups:
    get:
      operationId: listTopups
      tags: [wallet]
      summary: List user's top-up requests
      responses:
        "200":
          description: Top-up history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Topup"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTopup
      tags: [wallet]
      summary: Submit a top-up request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTopupBody"
      responses:
        "201":
          description: Top-up request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Topup"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Admin ───────────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List all orders
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: All orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminOrder"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/topups:
    get:
      operationId: listAdminTopups
      tags: [admin]
      summary: List all top-up requests
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: All topups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminTopup"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/topups/{id}/approve:
    post:
      operationId: approveTopup
      tags: [admin]
      summary: Approve a top-up request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTopupActionBody"
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/topups/{id}/reject:
    post:
      operationId: rejectTopup
      tags: [admin]
      summary: Reject a top-up request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTopupActionBody"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products:
    get:
      operationId: listAdminProducts
      tags: [admin]
      summary: List all products (including inactive)
      responses:
        "200":
          description: All products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminProduct"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createProduct
      tags: [admin]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/products/{id}:
    patch:
      operationId: updateProduct
      tags: [admin]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProduct"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [admin]
      summary: Archive/delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List all users
      parameters:
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "401":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    # ── Auth ──────────────────────────────────────────────────────────────────
    RegisterBody:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
        referral_code:
          type: ["string", "null"]
      required: [phone, password]

    LoginBody:
      type: object
      properties:
        phone:
          type: string
        password:
          type: string
      required: [phone, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        wallet_balance:
          type: number
        loyalty_points:
          type: integer
        loyalty_tier:
          type: string
        lifetime_spend:
          type: number
        referral_code:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, phone, wallet_balance, loyalty_points, loyalty_tier, lifetime_spend]

    # ── Products ──────────────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
        price:
          type: number
        category:
          type: ["string", "null"]
        is_active:
          type: boolean
        usage_terms:
          type: ["string", "null"]
        stock_count:
          type: integer
        is_available:
          type: boolean
        sale_price:
          type: ["number", "null"]
        discount_percent:
          type: ["number", "null"]
        order_count:
          type: integer
      required: [id, name, price, is_active, stock_count, is_available, order_count]

    CatalogStats:
      type: object
      properties:
        total_products:
          type: integer
        available_products:
          type: integer
        total_units:
          type: integer
        lowest_price:
          type: ["number", "null"]
        has_flash_sale:
          type: boolean
      required: [total_products, available_products, total_units, has_flash_sale]

    FlashSaleResponse:
      type: object
      properties:
        flash_sale:
          type: ["object", "null"]
          properties:
            id:
              type: integer
            title:
              type: string
            discount_percent:
              type: number
            ends_at:
              type: string
          required: [id, title, discount_percent, ends_at]
      required: [flash_sale]

    # ── Orders ────────────────────────────────────────────────────────────────
    CreateOrderBody:
      type: object
      properties:
        product_id:
          type: integer
      required: [product_id]

    Order:
      type: object
      properties:
        id:
          type: integer
        order_code:
          type: string
        product_id:
          type: integer
        product_name:
          type: string
        product_image_url:
          type: ["string", "null"]
        amount:
          type: number
        status:
          type: string
          enum: [pending, completed, failed, refunded]
        delivered_email:
          type: ["string", "null"]
        delivered_password:
          type: ["string", "null"]
        delivered_extra_details:
          type: ["string", "null"]
        delivered_usage_terms:
          type: ["string", "null"]
        delivered_at:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, order_code, product_id, product_name, amount, status, created_at]

    # ── Wallet ────────────────────────────────────────────────────────────────
    WalletInfo:
      type: object
      properties:
        balance:
          type: number
        loyalty_points:
          type: integer
        loyalty_tier:
          type: string
        pending_topups_count:
          type: integer
        recent_orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
      required: [balance, loyalty_points, loyalty_tier, pending_topups_count, recent_orders]

    CreateTopupBody:
      type: object
      properties:
        amount:
          type: number
        payment_network:
          type: string
        sender_phone:
          type: string
        payment_reference:
          type: ["string", "null"]
      required: [amount, payment_network, sender_phone]

    Topup:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
        payment_network:
          type: string
        sender_phone:
          type: ["string", "null"]
        payment_reference:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        admin_note:
          type: ["string", "null"]
        created_at:
          type: string
        reviewed_at:
          type: ["string", "null"]
      required: [id, amount, payment_network, status, created_at]

    # ── Admin ─────────────────────────────────────────────────────────────────
    AdminLoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AdminAuthResponse:
      type: object
      properties:
        token:
          type: string
        display_name:
          type: string
      required: [token, display_name]

    AdminStats:
      type: object
      properties:
        total_users:
          type: integer
        total_orders:
          type: integer
        total_revenue:
          type: number
        pending_topups:
          type: integer
        today_orders:
          type: integer
        today_revenue:
          type: number
        available_stock:
          type: integer
        total_wallet_balance:
          type: number
      required: [total_users, total_orders, total_revenue, pending_topups, today_orders, today_revenue, available_stock, total_wallet_balance]

    AdminOrder:
      type: object
      properties:
        id:
          type: integer
        order_code:
          type: string
        user_phone:
          type: string
        product_name:
          type: string
        amount:
          type: number
        status:
          type: string
        delivered_email:
          type: ["string", "null"]
        delivered_password:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, order_code, user_phone, product_name, amount, status, created_at]

    AdminTopup:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        user_phone:
          type: string
        amount:
          type: number
        payment_network:
          type: string
        sender_phone:
          type: ["string", "null"]
        payment_reference:
          type: ["string", "null"]
        status:
          type: string
        admin_note:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, user_id, user_phone, amount, payment_network, status, created_at]

    AdminTopupActionBody:
      type: object
      properties:
        admin_note:
          type: ["string", "null"]

    AdminProduct:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
        price:
          type: number
        category:
          type: ["string", "null"]
        is_active:
          type: boolean
        is_archived:
          type: boolean
        stock_count:
          type: integer
        order_count:
          type: integer
        usage_terms:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, name, price, is_active, is_archived, stock_count, order_count, created_at]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
        price:
          type: number
        category:
          type: ["string", "null"]
        usage_terms:
          type: ["string", "null"]
        is_active:
          type: boolean
      required: [name, price]

    UpdateProductBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        image_url:
          type: ["string", "null"]
        price:
          type: ["number", "null"]
        category:
          type: ["string", "null"]
        usage_terms:
          type: ["string", "null"]
        is_active:
          type: ["boolean", "null"]

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        phone:
          type: string
        wallet_balance:
          type: number
        loyalty_points:
          type: integer
        loyalty_tier:
          type: string
        lifetime_spend:
          type: number
        order_count:
          type: integer
        referral_code:
          type: ["string", "null"]
        created_at:
          type: string
      required: [id, phone, wallet_balance, loyalty_points, loyalty_tier, lifetime_spend, order_count, created_at]
