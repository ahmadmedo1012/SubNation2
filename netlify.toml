[build]
  command = "pnpm --filter @workspace/mockup-sandbox... run build"
  publish = "artifacts/mockup-sandbox/dist"

[build.environment]
  # Exclude dist folder from secrets scan - contains only public keys (Firebase, Google Client ID, reCAPTCHA)
  SECRETS_SCAN_OMIT_PATHS = "artifacts/mockup-sandbox/dist"
