<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta data-rh="true" name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- google-site-verification meta is injected at build time by the
         seoHeadInject Vite plugin in vite.config.ts. When
         VITE_GSC_VERIFICATION is unset, the meta is emitted with
         content="" — harmless, ignored by Search Console. When set,
         the operator's token appears here. -->
    <!-- ── Why data-rh="true" on the SEO tags below ───────────────────
         react-helmet-async tracks the tags it owns via the data-rh
         attribute. On a route that uses useSeo()/MetaTags, Helmet
         renders fresh <title>/<meta name="description">/<meta og:*>
         tags into <head>. Without data-rh on the static defaults,
         the static tags would remain AND Helmet would append its own,
         shipping two of each — which Lighthouse / SEO crawlers flag
         as "more than one title tag" and "more than one description
         tag". Marking the statics as Helmet-managed lets Helmet
         replace them in place. Tags without data-rh (charset, icons,
         preconnect, manifest…) are left alone because MetaTags never
         renders them. -->
    <title data-rh="true">SubNation — سوق الاشتراكات الرقمية</title>
    <meta
      data-rh="true"
      name="description"
      content="سوق الاشتراكات الرقمية في ليبيا. اشترك في Netflix وSpotify وPS Plus وDisney+ وأكثر بالدينار الليبي."
    />
    <meta data-rh="true" name="theme-color" content="#5c7cfa" />
    <meta data-rh="true" property="og:title" content="SubNation — سوق الاشتراكات الرقمية" />
    <meta data-rh="true" property="og:description" content="اشترك في أفضل الخدمات الرقمية بالدينار الليبي" />
    <meta data-rh="true" property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/subnation-logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SubNation" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- ── Network hints ───────────────────────────────────────────────
         preconnect runs the DNS+TLS+TCP handshake during HTML parse so
         the first request to each origin starts ~150 ms sooner on a
         cold visit. Origins that we always hit on first paint go here
         (image2url for product images). Origins that are only hit on
         a delayed action (Firebase popup on login click, recaptcha)
         get dns-prefetch — cheaper signal that doesn't burn an idle
         TLS slot.

         Note: Google Fonts is no longer in this list. Readex Pro is
         now self-hosted via @fontsource and bundled by Vite — the
         woff2 files live under /assets/ on the same origin and are
         covered by the 1y immutable cache rule. -->
    <link rel="preconnect" href="https://image2url.com" crossorigin />
    <link rel="dns-prefetch" href="https://apis.google.com" />
    <link rel="dns-prefetch" href="https://subnation-2571e.firebaseapp.com" />
    <link rel="dns-prefetch" href="https://www.google.com" />
    <link rel="dns-prefetch" href="https://www.gstatic.com" />

    <script src="/init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
