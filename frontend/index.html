<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- google-site-verification meta is injected at build time by the
         seoHeadInject Vite plugin in vite.config.ts. When
         VITE_GSC_VERIFICATION is unset, the meta is emitted with
         content="" — harmless, ignored by Search Console. When set,
         the operator's token appears here. -->
    <title>SubNation — سوق الاشتراكات الرقمية</title>
    <meta
      name="description"
      content="سوق الاشتراكات الرقمية في ليبيا. اشترك في Netflix وSpotify وPS Plus وDisney+ وأكثر بالدينار الليبي."
    />
    <meta name="theme-color" content="#5c7cfa" />
    <meta property="og:title" content="SubNation — سوق الاشتراكات الرقمية" />
    <meta property="og:description" content="اشترك في أفضل الخدمات الرقمية بالدينار الليبي" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/subnation-logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SubNation" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- ── Network hints ───────────────────────────────────────────────
         preconnect runs the DNS+TLS+TCP handshake during HTML parse so
         the first request to each origin starts ~150 ms sooner on a
         cold visit. Origins that we always hit on first paint go here
         (fonts.googleapis, fonts.gstatic, image2url for product images).
         Origins that are only hit on a delayed action (Firebase popup
         on login click, recaptcha) get dns-prefetch — cheaper signal
         that doesn't burn an idle TLS slot. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://image2url.com" crossorigin />
    <link rel="dns-prefetch" href="https://apis.google.com" />
    <link rel="dns-prefetch" href="https://subnation-2571e.firebaseapp.com" />
    <link rel="dns-prefetch" href="https://www.google.com" />
    <link rel="dns-prefetch" href="https://www.gstatic.com" />

    <!-- ── Fonts (async, non-render-blocking) ──────────────────────────
         The default <link rel="stylesheet"> blocks first paint until
         the CSS arrives — measurable ~80–150 ms LCP cost on mobile.
         The preload+swap pattern below loads the stylesheet at high
         priority but keeps it off the critical render path. The
         &display=swap parameter makes the @font-face rules show the
         fallback immediately while the woff2 streams in.
         The <noscript> fallback restores synchronous behaviour for
         users without JS so the brand font still renders. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;600;700&display=swap"
      />
    </noscript>
    <script src="/init.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
