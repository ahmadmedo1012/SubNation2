<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>SubNation — سوق الاشتراكات الرقمية</title>
    <meta
      name="description"
      content="سوق الاشتراكات الرقمية في ليبيا. اشترك في Netflix وSpotify وPS Plus وDisney+ وأكثر بالدينار الليبي."
    />
    <meta name="theme-color" content="#5c7cfa" />
    <meta property="og:title" content="SubNation — سوق الاشتراكات الرقمية" />
    <meta property="og:description" content="اشترك في أفضل الخدمات الرقمية بالدينار الليبي" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/subnation-logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SubNation" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Firebase auth preconnect reduces iframe waterfall -->
    <link rel="preconnect" href="https://apis.google.com" crossorigin />
    <link rel="dns-prefetch" href="https://subnation-2571e.firebaseapp.com" />
    <!-- Preload critical font woff2 directly (faster than CSS @import chain) -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://fonts.gstatic.com/s/readexpro/v27/SLXYc1bJ7HE5YDoGPuzj_dh8uc7wUy8ZQQyX2IwwZEzehiB9.woff2"
      crossorigin
    />
    <!-- Non-blocking font stylesheet -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;600;700&display=swap"
    /></noscript>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("sn_theme");
          if (t === "light") document.documentElement.classList.add("light");
        } catch (e) {}
      })();
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function () {});
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
