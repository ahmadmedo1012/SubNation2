name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Single root install; matches pnpm monorepo guidance (pnpm.io).
jobs:
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_LICENSE: "MIT" # gitleaks is MIT licensed

  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    needs: secret-scan
    env:
      DATABASE_URL: postgres://ci:ci@localhost/ci
      SESSION_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from root package.json "packageManager" (pnpm@10.0.0) only.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck (project references + packages)
        run: pnpm run typecheck

      - name: Migration check
        run: pnpm --filter @workspace/db exec drizzle-kit generate && git diff --exit-code

      - name: Backend unit tests
        run: pnpm --filter @workspace/api-server exec vitest run

      - name: Production build (API + Vite SPA)
        run: pnpm --filter @workspace/api-server run build
