# -----------------------------------------------------------------------------
# SubNation - single-host application stack.
#
#   docker compose up --build
#
# All runtime configuration is read from the `.env` file at the repo root
# (create it from `config/env.example`). You should not need to edit this
# file to deploy to a new environment.
# -----------------------------------------------------------------------------

services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      NODE_ENV: production
    ports:
      - "${PORT:-8080}:8080"
