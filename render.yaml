services:
  - type: web
    name: subnation
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Set in the Render Dashboard (Neon / Postgres connection string). Do not commit secrets.
      - key: DATABASE_URL
        sync: false
      - key: DB_POOL_MAX
        value: "5"
      - key: DB_IDLE_TIMEOUT_MS
        value: "30000"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      - key: SESSION_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: APP_URL
        value: "https://subnation2.onrender.com"
      - key: APP_ORIGINS
        value: "https://subnation2.onrender.com"
      - key: VITE_API_URL
        value: "https://subnation2.onrender.com"
      - key: BASE_PATH
        value: /
      - key: VITE_APP_NAME
        value: SubNation
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: VITE_GOOGLE_CLIENT_ID
        value: ""
      - key: FIREBASE_AUTH_ENABLED
        value: "true"
      - key: VITE_FIREBASE_AUTH_ENABLED
        value: "true"
      # Firebase web client config: set in Dashboard (same values as local .env / Vite).
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_FIREBASE_DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_RESET_PASSWORD
        value: "false"
      - key: SENTRY_DSN
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: subnation-redis
          property: connectionString

  - type: redis
    name: subnation-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: worker
    name: subnation-worker
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: "pnpm --filter @workspace/api-server start:worker"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: subnation-redis
          property: connectionString
