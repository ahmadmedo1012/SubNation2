services:
  - type: web
    name: subnation
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Set in the Render Dashboard (Neon / Postgres connection string). Do not commit secrets.
      - key: DATABASE_URL
        sync: false
      - key: DB_POOL_MAX
        value: "15"
      - key: DB_IDLE_TIMEOUT_MS
        value: "10000"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "30000"
      - key: SESSION_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: APP_URL
        value: "https://subnation.ly"
      - key: APP_ORIGINS
        # Canonical apex + www. Pre-launch state: no legacy origin
        # compatibility — the platform is still in development.
        value: "https://subnation.ly,https://www.subnation.ly"
      - key: VITE_API_URL
        value: "https://subnation.ly"
      - key: VITE_APP_ORIGIN
        value: "https://subnation.ly"
      - key: BASE_PATH
        value: /
      - key: VITE_APP_NAME
        value: SubNation
      # Google Search Console site-verification token (HTML tag method).
      # Operator-set in Render Dashboard: Settings → Environment → Add
      # Environment Variable → VITE_GSC_VERIFICATION = <token from
      # search.google.com/search-console>. Empty when unset = harmless;
      # Search Console simply fails ownership detection until set.
      - key: VITE_GSC_VERIFICATION
        sync: false
      - key: GOOGLE_CLIENT_ID
        value: ""
      - key: VITE_GOOGLE_CLIENT_ID
        value: ""
      - key: FIREBASE_PROJECT_ID
        value: "subnation-2571e"
      - key: FIREBASE_AUTH_ENABLED
        value: "true"
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: VITE_FIREBASE_AUTH_ENABLED
        value: "true"
      # Firebase web client config: set in Dashboard (same values as local .env / Vite).
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_MEASUREMENT_ID
        sync: false
      - key: VITE_FIREBASE_DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_RESET_PASSWORD
        value: "false"
      # Backend Sentry DSN. Set in Render Dashboard → Environment with
      # the value from the Sentry project page:
      #   https://11936f1c161b16bd27a9439dd2ce30ca@o4511397349097472.ingest.de.sentry.io/4511414239559760
      # IMPORTANT: this MUST be sync:false (not generateValue:true) —
      # a Render-generated random string is not a valid Sentry DSN.
      - key: SENTRY_DSN
        sync: false
      # Trace sampling rate. Production default is 0.1 (10% of
      # transactions). Bump to 1.0 for a release window when investigating
      # regressions; revert immediately to avoid burning quota.
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"
      - key: SENTRY_PROFILES_SAMPLE_RATE
        value: "0.1"
      # Slow-query threshold in ms. Queries above this are warn-logged +
      # surface in pg_query_duration_seconds histogram with slow="1".
      - key: SLOW_QUERY_THRESHOLD_MS
        value: "250"
      - key: VITE_SENTRY_DSN
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      - key: METRICS_ADMIN_TOKEN
        sync: false
      - key: ALERTING_ENABLED
        value: "false"
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: GENERIC_ALERT_WEBHOOK_URL
        sync: false
      # Migration switch for the worker tier. Today the web process runs
      # the heartbeat + alerting evaluator + cron under a Redis-backed
      # leader lock. Once `subnation-worker` is provisioned, set this to
      # `true` so the web tier stops running them and the worker takes over.
      - key: DISABLE_WEB_SCHEDULERS
        value: "false"
      # Operator escape hatch for the boot-time migration runner. When
      # `true`, server.ts skips runMigrations() entirely on cold start.
      # Use ONLY for emergency rollbacks where the migration shipped in
      # a release is broken and you need to bring up the previous binary
      # against the newer schema. Default `false` — every cold start
      # reconciles schema (idempotent, lock-protected). Owner sets this
      # transiently in the dashboard, redeploys, then unsets it.
      - key: DISABLE_BOOT_MIGRATIONS
        value: "false"
      - key: REDIS_URL
        fromService:
          type: redis
          name: subnation-redis
          property: connectionString

  - type: redis
    name: subnation-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  - type: worker
    name: subnation-worker
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerCommand: "pnpm --filter @workspace/api-server start:worker"
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: subnation-redis
          property: connectionString
