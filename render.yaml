services:
  - type: web
    name: subnation
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: APP_ORIGINS
        sync: false
      - key: VITE_API_URL
        value: ""
      - key: BASE_PATH
        value: /
      - key: VITE_APP_NAME
        value: SubNation
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
