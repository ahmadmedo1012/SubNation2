kind = "web"
previewPath = "/"
title = "SubNation"
version = "1.0.0"
id = "artifacts/subnation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21071

[services.development]
run = "pnpm --filter @workspace/subnation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/subnation", "run", "build" ]
publicDir = "artifacts/subnation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21071"
BASE_PATH = "/"
